services:
  postgres:
    image: postgres:17

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortner

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .

    restart: always

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:password@postgres:5432/url_shortner

    depends_on:
      - postgres

volumes:
  postgres_data: